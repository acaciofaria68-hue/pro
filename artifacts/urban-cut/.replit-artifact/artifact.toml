kind = "web"
previewPath = "/"
title = "Urban Cut"
version = "1.0.0"
id = "artifacts/urban-cut"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20101

[services.development]
run = "pnpm --filter @workspace/urban-cut run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urban-cut", "run", "build" ]
publicDir = "artifacts/urban-cut/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20101"
BASE_PATH = "/"
